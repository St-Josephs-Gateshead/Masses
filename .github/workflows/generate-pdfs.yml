name: "Generate PDFs"

on: 
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  set-up:
    runs-on: ubuntu-latest
    outputs:
      dirs: ${{steps.dirs.outputs.dirs}}

    steps:
      - name: Get Dirs
        id: dirs
        run: |
          echo "dirs = [" >> "$GITHUB_OUTPUT"
          cat scripts/folders_to_generate.txt >> "$GITHUB_OUTPUT"
          echo "]" >> "$GITHUB_OUTPUT"

          
  generate-pdfs:
    runs-on: ubuntu-latest
    needs: set-up
    strategy:
      matrix:
        dir: ${{ fromJSON(needs.set-up.outputs.dirs) }}
    permissions:
      actions: write
      contents: write

    steps:
      - uses: DeterminateSystems/nix-installer-action@main
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: install
        run: nix develop --command true
      - name: build
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          while true
          do
            free -h
            sleep 30
          done &
          nix develop --command bash "make -C ${{ matrix.dir }}"
      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.dir }}
          path: "${{ matrix.dir }}/*.pdf"
      - name: git add
        run: |
          ls ${{ matrix.dir }}